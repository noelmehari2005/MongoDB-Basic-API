<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products API</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Books API</h1>
    <p>This page reads books from <code>/api/books</code> and lets you add a book.</p>

    <form id="product-form">
      <input name="title" placeholder="Title" required>
      <input name="author" placeholder="Author" required>
      <input name="price" type="number" step="0.01" min="0" placeholder="Price" required>
      <input name="year" type="number" step="1" placeholder="Year" required>
      <button type="submit">Add Product</button>
    </form>

    <p id="message"></p>
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Price</th>
          <th>Year</th>
        </tr>
      </thead>
      <tbody id="products-body"></tbody>
    </table>
  </main>
  <script src="app.js"></script>
</body>
</html>
