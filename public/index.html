<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products API</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Products API</h1>
    <p>This page reads products from <code>/api/products</code> and lets you add a product.</p>

    <form id="product-form">
      <input name="name" placeholder="Name" required>
      <input name="price" type="number" step="0.01" min="0" placeholder="Price" required>
      <input name="quantity" type="number" min="0" step="1" placeholder="Quantity" required>
      <input name="warehouse" placeholder="Warehouse" maxlength="1" required>
      <button type="submit">Add Product</button>
    </form>

    <p id="message"></p>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Warehouse</th>
        </tr>
      </thead>
      <tbody id="products-body"></tbody>
    </table>
  </main>
  <script src="app.js"></script>
</body>
</html>
